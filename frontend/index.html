<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>备件管理系统 - 登录</title>
    <link href="assets/css/tailwind.css" rel="stylesheet">
    <link href="assets/css/font-awesome.min.css" rel="stylesheet">
    <script>
        (function () {
            const params = new URLSearchParams(window.location.search);
            const isEmbedded = window.top !== window.self || params.get('embedded') === '1';
            if (!isEmbedded) return;

            try {
                if (window.top && window.top !== window && window.top.location.origin === window.location.origin) {
                    const topToken = window.top.localStorage.getItem('access_token')
                        || window.top.sessionStorage.getItem('access_token')
                        || window.top.localStorage.getItem('token');
                    const topUser = window.top.localStorage.getItem('user')
                        || window.top.sessionStorage.getItem('user');
                    if (topToken && topUser) {
                        const next = new URL('dashboard-view.html', window.location.href);
                        next.searchParams.set('embedded', '1');
                        window.location.replace(next.toString());
                    }
                }
            } catch (error) {
                // ignore cross-context access errors
            }
        })();
    </script>
</head>
<body class="bg-gray-100 min-h-screen">
    <div class="flex items-center justify-center min-h-screen p-4" style="background-image: url('assets/images/login-bg.png'); background-size: cover; background-position: center;">
        <div class="w-full max-w-md">
            <div class="bg-white rounded-lg shadow-xl overflow-hidden">
                <div class="bg-gradient-blue p-6 text-center">
                    <img src="assets/images/logo.png" alt="Logo" class="w-20 h-20 mx-auto mb-4">
                    <h1 class="text-2xl font-bold text-white text-shadow">备件管理系统</h1>
                    <p class="text-blue-100 mt-1">库存管理解决方案</p>
                </div>

                <div class="p-8">
                    <form id="loginForm" class="space-y-6">
                        <div>
                            <label for="username" class="block text-sm font-medium text-gray-700 mb-1">用户名</label>
                            <div class="relative">
                                <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-500">
                                    <i class="fa fa-user"></i>
                                </span>
                                <input type="text" id="username" name="username" class="w-full pl-10 pr-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all-300" placeholder="请输入用户名" required>
                            </div>
                        </div>

                        <div>
                            <label for="password" class="block text-sm font-medium text-gray-700 mb-1">密码</label>
                            <div class="relative">
                                <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-500">
                                    <i class="fa fa-lock"></i>
                                </span>
                                <input type="password" id="password" name="password" class="w-full pl-10 pr-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all-300" placeholder="请输入密码" required>
                                <button type="button" id="togglePassword" class="absolute inset-y-0 right-0 flex items-center pr-3 text-gray-500 hover:text-gray-700 transition-all-300">
                                    <i class="fa fa-eye-slash"></i>
                                </button>
                            </div>
                        </div>

                        <div class="flex items-center justify-between">
                            <div class="flex items-center">
                                <input type="checkbox" id="remember" name="remember" class="h-4 w-4 text-primary focus:ring-primary border-gray-300 rounded">
                                <label for="remember" class="ml-2 block text-sm text-gray-700">记住我</label>
                            </div>
                            <a href="#" class="text-sm text-primary hover:text-secondary transition-all-300">忘记密码？</a>
                        </div>

                        <div>
                            <button type="submit" class="w-full bg-primary text-white py-2 px-4 rounded-md hover:bg-secondary focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary transition-all-300 flex items-center justify-center">
                                <span>登录</span>
                                <i class="fa fa-sign-in ml-2"></i>
                            </button>
                        </div>
                    </form>

                    <div id="errorMessage" class="mt-4 hidden">
                        <div class="bg-red-50 border border-red-200 text-red-600 px-4 py-3 rounded-md text-sm">
                            <i class="fa fa-exclamation-circle mr-2"></i>
                            <span id="errorText"></span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="mt-6 text-center text-white text-shadow">
                <p class="text-sm">&copy; 2026 备件管理系统. Cutia Wuxi 保留所有权利</p>
            </div>
        </div>
    </div>

    <script>
        const API_BASE_URL = 'api';

        const loginForm = document.getElementById('loginForm');
        const togglePassword = document.getElementById('togglePassword');
        const passwordInput = document.getElementById('password');
        const errorMessage = document.getElementById('errorMessage');
        const errorText = document.getElementById('errorText');

        togglePassword.addEventListener('click', function() {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            this.querySelector('i').classList.toggle('fa-eye');
            this.querySelector('i').classList.toggle('fa-eye-slash');
        });

        loginForm.addEventListener('submit', async function(e) {
            e.preventDefault();

            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const remember = document.getElementById('remember').checked;

            errorMessage.classList.add('hidden');

            try {
                const submitButton = loginForm.querySelector('button[type="submit"]');
                const originalText = submitButton.innerHTML;
                submitButton.disabled = true;
                submitButton.innerHTML = '<i class="fa fa-spinner fa-spin mr-2"></i> 登录中...';

                const response = await fetch(`${API_BASE_URL}/token`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded'
                    },
                    body: new URLSearchParams({ username, password })
                });

                submitButton.disabled = false;
                submitButton.innerHTML = originalText;

                if (!response.ok) {
                    throw new Error('用户名或密码错误');
                }

                const data = await response.json();

                if (remember) {
                    sessionStorage.removeItem('access_token');
                    sessionStorage.removeItem('user');
                    sessionStorage.removeItem('token_expiry');

                    localStorage.setItem('access_token', data.access_token);
                    localStorage.setItem('user', JSON.stringify(data.user));

                    const expiryDate = new Date();
                    expiryDate.setDate(expiryDate.getDate() + 7);
                    localStorage.setItem('token_expiry', expiryDate.toISOString());
                } else {
                    localStorage.removeItem('access_token');
                    localStorage.removeItem('user');
                    localStorage.removeItem('token_expiry');

                    sessionStorage.setItem('access_token', data.access_token);
                    sessionStorage.setItem('user', JSON.stringify(data.user));
                    sessionStorage.setItem('token_expiry', data.expiry);
                }

                window.location.href = 'dashboard.html';
            } catch (error) {
                errorText.textContent = error.message;
                errorMessage.classList.remove('hidden');
                errorMessage.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }
        });

        document.addEventListener('DOMContentLoaded', function() {
            let token = localStorage.getItem('access_token');
            let expiry = localStorage.getItem('token_expiry');

            if (!token) {
                token = sessionStorage.getItem('access_token');
                expiry = sessionStorage.getItem('token_expiry');
            }

            if (token) {
                if (!expiry || new Date() < new Date(expiry)) {
                    window.location.href = 'dashboard.html';
                } else {
                    localStorage.removeItem('access_token');
                    localStorage.removeItem('user');
                    localStorage.removeItem('token_expiry');
                    sessionStorage.removeItem('access_token');
                    sessionStorage.removeItem('user');
                    sessionStorage.removeItem('token_expiry');
                }
            }
        });
    </script>
</body>
</html>
